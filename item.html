<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lityen 🔥</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #2e1f08;
  --bg2:    rgba(255,220,120,0.08);
  --bg3:    rgba(255,220,120,0.14);
  --border: rgba(255,220,120,0.30);
  --border-h: rgba(255,220,120,0.70);
  --accent: #ffb830;
  --text:   #fff8ee;
  --text2:  #f0c878;
  --text3:  #c09050;
  --orange: #ff6b1a;
  --orange-bg: rgba(255,107,26,0.13);
  --orange-b:  rgba(255,107,26,0.35);
  --danger: #ff5e7d;
  --success:#4dffa0;
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.orb-a {
  position: fixed; top: -200px; left: -150px; width: 700px; height: 700px;
  border-radius: 50%; pointer-events: none; z-index: 0;
  background: radial-gradient(circle, rgba(255,180,40,0.45) 0%, transparent 65%);
}
.orb-b {
  position: fixed; bottom: -200px; right: -150px; width: 650px; height: 650px;
  border-radius: 50%; pointer-events: none; z-index: 0;
  background: radial-gradient(circle, rgba(255,90,0,0.35) 0%, transparent 65%);
}

/* HEADER */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(46,31,8,0.45); backdrop-filter: blur(40px) saturate(2.5) brightness(1.3); -webkit-backdrop-filter: blur(40px) saturate(2.5) brightness(1.3);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.75rem; height: 56px;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem; letter-spacing: 0.1em;
  color: var(--text); text-decoration: none;
}
.back-btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  font-size: 0.75rem; font-weight: 600;
  padding: 0.4rem 1rem; border-radius: 100px;
  border: 1px solid var(--border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  color: var(--text2); text-decoration: none;
  transition: all 0.2s; letter-spacing: 0.02em;
}
.back-btn:hover { border-color: var(--border-h); color: var(--text); }

/* HERO — image + info side by side */
.hero {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3rem;
  max-width: 1020px;
  margin: 0 auto;
  padding: 2.5rem 1.75rem;
  position: relative; z-index: 1;
  align-items: start;
}

/* MAIN IMAGE */
.main-img-wrap {
  border-radius: 18px;
  overflow: hidden;
  aspect-ratio: 3/4;
  background: rgba(255,220,120,0.07); backdrop-filter: blur(40px) saturate(2) brightness(1.3); -webkit-backdrop-filter: blur(40px) saturate(2) brightness(1.3);
  border: 1px solid var(--border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  position: relative;
}
.main-img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
.main-img-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 5rem; color: var(--text3);
}
.badge-new {
  position: absolute; top: 0.75rem; left: 0.75rem;
  font-size: 0.56rem; font-weight: 700; letter-spacing: 0.09em;
  text-transform: uppercase; padding: 0.2rem 0.6rem;
  border-radius: 100px; background: var(--accent); color: #100c06;
  font-family: 'Outfit', sans-serif;
}
.badge-seen {
  position: absolute; top: 0.75rem; right: 0.75rem;
  font-size: 0.7rem; padding: 0.15rem 0.45rem;
  border-radius: 100px; background: rgba(0,0,0,0.65);
}

/* INFO PANEL */
.info {
  display: flex; flex-direction: column; gap: 1rem;
  padding-top: 0.5rem;
}
.info-cat {
  font-size: 0.65rem; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600;
}
.info-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2rem, 4vw, 3rem);
  letter-spacing: 0.04em; line-height: 1.05;
}
.info-price {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem; color: var(--accent); letter-spacing: 0.06em;
}
.info-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
.info-tag {
  font-size: 0.62rem; font-weight: 500;
  padding: 0.12rem 0.5rem; border-radius: 100px;
  border: 1px solid var(--border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); color: var(--text3);
}
.info-notes {
  font-size: 0.82rem; color: var(--text2); line-height: 1.75;
  background: rgba(255,220,120,0.08); backdrop-filter: blur(40px) saturate(2) brightness(1.3); -webkit-backdrop-filter: blur(40px) saturate(2) brightness(1.3); border: 1px solid var(--border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 12px; padding: 0.9rem 1rem;
}
.info-links { display: flex; flex-direction: column; gap: 0.6rem; }

/* litbuy button */
.litbuy-btn {
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 600;
  padding: 0.75rem 1.5rem; border-radius: 12px;
  background: var(--orange-bg); border: 1px solid var(--orange-b);
  color: var(--orange); text-decoration: none; transition: background 0.2s;
  letter-spacing: 0.02em;
}
.litbuy-btn:hover { background: rgba(255,107,26,0.22); }
.litbuy-btn img { width: 16px; height: 16px; border-radius: 3px; }

.sec-links { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.sec-link {
  font-size: 0.72rem; font-weight: 500;
  padding: 0.35rem 0.85rem; border-radius: 100px;
  border: 1px solid var(--border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); color: var(--text2);
  text-decoration: none; transition: all 0.2s;
}
.sec-link:hover { border-color: var(--border-h); color: var(--text); }
.sec-link.weidian { border-color: rgba(255,94,125,0.25); color: var(--danger); }
.sec-link.weidian:hover { background: rgba(255,94,125,0.08); }

/* QC SECTION */
.qc-section {
  max-width: 1020px; margin: 0 auto;
  padding: 0 1.75rem 4rem;
  position: relative; z-index: 1;
}
.qc-divider {
  height: 1px; background: var(--border); margin-bottom: 1.5rem;
}
.qc-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem; letter-spacing: 0.06em;
  margin-bottom: 1rem; color: var(--text);
  display: flex; align-items: center; gap: 0.5rem;
}
.qc-count {
  font-family: 'Outfit', sans-serif;
  font-size: 0.72rem; color: var(--text3); font-weight: 500;
  letter-spacing: 0;
}

/* QC thumbnail row */
.qc-row {
  display: flex; gap: 0.6rem;
  overflow-x: auto; scrollbar-width: none;
  padding-bottom: 0.5rem;
}
.qc-row::-webkit-scrollbar { display: none; }
.qc-thumb {
  width: 120px; height: 120px;
  border-radius: 10px; overflow: hidden;
  flex-shrink: 0; cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
  background: rgba(255,220,120,0.07); backdrop-filter: blur(40px) saturate(2) brightness(1.3); -webkit-backdrop-filter: blur(40px) saturate(2) brightness(1.3);
}
.qc-thumb img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform 0.3s;
}
.qc-thumb:hover { border-color: var(--accent); }
.qc-thumb:hover img { transform: scale(1.05); }

/* LIGHTBOX */
.lightbox {
  display: none;
  position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(12px);
  align-items: center; justify-content: center;
}
.lightbox.open { display: flex; }
.lightbox-img {
  max-width: 90vw; max-height: 88vh;
  object-fit: contain; border-radius: 12px;
  user-select: none;
}
.lightbox-close {
  position: absolute; top: 1.25rem; right: 1.5rem;
  font-size: 1.5rem; color: rgba(255,255,255,0.5);
  cursor: pointer; transition: color 0.2s; line-height: 1;
  background: none; border: none;
}
.lightbox-close:hover { color: #fff; }
.lightbox-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 44px; height: 44px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 100px; color: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.2s;
  font-size: 1.1rem; user-select: none;
  backdrop-filter: blur(4px);
}
.lightbox-arrow:hover { background: rgba(255,255,255,0.18); }
.lightbox-prev { left: 1.25rem; }
.lightbox-next { right: 1.25rem; }
.lightbox-counter {
  position: absolute; bottom: 1.25rem; left: 50%; transform: translateX(-50%);
  font-size: 0.72rem; color: rgba(255,255,255,0.4);
  font-family: 'Outfit', sans-serif;
}

/* LOADING / NOT FOUND */
.loading-state {
  display: flex; flex-direction: column; align-items: center;
  gap: 0.75rem; padding: 6rem; color: var(--text3); font-size: 0.8rem;
}
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.not-found {
  text-align: center; padding: 6rem 1rem; color: var(--text3);
}
.not-found p { margin-bottom: 1.5rem; }
.not-found a {
  font-size: 0.8rem; color: var(--text2);
  border: 1px solid var(--border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 0.5rem 1.2rem;
  border-radius: 100px; text-decoration: none; transition: all 0.2s;
}
.not-found a:hover { border-color: var(--border-h); color: var(--text); }

@media (max-width: 680px) {
  .hero { grid-template-columns: 1fr; gap: 1.5rem; padding: 1.5rem 1rem; }
  .qc-section { padding: 0 1rem 3rem; }
  .header { padding: 0 1rem; }
  .qc-thumb { width: 90px; height: 90px; }
}
</style>
</head>
<body>
<div class="orb-a"></div>
<div class="orb-b"></div>
<div class="orb-c"></div>

<header class="header">
  <a href="index.html" class="logo">lityen 🔥</a>
  <a href="catalog.html" class="back-btn">← Back to catalog</a>
</header>

<div id="itemContent">
  <div class="loading-state" style="position:relative;z-index:1">
    <div class="spinner"></div>
    <span>loading...</span>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-arrow lightbox-prev" onclick="lightboxNav(-1)">‹</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="">
  <button class="lightbox-arrow lightbox-next" onclick="lightboxNav(1)">›</button>
  <div class="lightbox-counter" id="lightboxCounter"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBo-hOtlG2aptuJ71LCoAd1BgVUINg3uvE",
  authDomain: "lityenn.firebaseapp.com",
  projectId: "lityenn",
  storageBucket: "lityenn.firebasestorage.app",
  messagingSenderId: "1074230941679",
  appId: "1:1074230941679:web:03091885d3e62d4b0a881a"
});
const db = getFirestore(app);
const id = new URLSearchParams(location.search).get('id');

let qcImages = [];
let lightboxIndex = 0;

async function load() {
  if (!id) { notFound(); return; }
  try {
    const snap = await getDoc(doc(db, 'items', id));
    if (!snap.exists()) { notFound(); return; }
    const item = { id: snap.id, ...snap.data() };
    document.title = `lityen — ${item.name}`;
    render(item);
  } catch(e) { notFound(); }
}

function notFound() {
  document.getElementById('itemContent').innerHTML = `
    <div class="not-found">
      <p>Item not found.</p>
      <a href="catalog.html">← back to catalog</a>
    </div>`;
}

function render(item) {
  qcImages = (item.qc || []).filter(Boolean);

  document.getElementById('itemContent').innerHTML = `
    <!-- HERO -->
    <div class="hero">
      <div class="main-img-wrap">
        ${item.img
          ? `<img src="${item.img}" alt="${item.name}" id="mainImg">`
          : `<div class="main-img-placeholder">📦</div>`}
        ${item.isNew ? `<span class="badge-new">new</span>` : ''}
        ${item.seenOnVideo ? `<span class="badge-seen">🎬</span>` : ''}
      </div>

      <div class="info">
        <div class="info-cat">${item.category || ''}</div>
        <h1 class="info-name">${item.name}</h1>
        <div class="info-price">${item.price || ''}</div>
        ${(item.tags || []).length
          ? `<div class="info-tags">${item.tags.map(t => `<span class="info-tag">${t}</span>`).join('')}</div>`
          : ''}
        ${item.notes
          ? `<div class="info-notes" style="white-space:pre-wrap">${item.notes}</div>`
          : ''}
        <div class="info-links">
          ${item.litbuy ? `
            <a class="litbuy-btn" href="${item.litbuy}" target="_blank" rel="noopener">
              <img src="https://www.google.com/s2/favicons?domain=litbuy.com&sz=32" alt="">
              Buy on Litbuy
            </a>` : ''}
          <div class="sec-links">
            ${item.weidian ? `<a class="sec-link weidian" href="${item.weidian}" target="_blank" rel="noopener">Weidian ↗</a>` : ''}
            ${item.taobao  ? `<a class="sec-link" href="${item.taobao}" target="_blank" rel="noopener">Taobao ↗</a>` : ''}
            ${item._1688   ? `<a class="sec-link" href="${item._1688}" target="_blank" rel="noopener">1688 ↗</a>` : ''}
          </div>
        </div>
      </div>
    </div>

    <!-- QC SECTION -->
    ${qcImages.length ? `
    <div class="qc-section">
      <div class="qc-divider"></div>
      <div class="qc-title">
        QC Pics
        <span class="qc-count">${qcImages.length} photo${qcImages.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="qc-row">
        ${qcImages.map((url, i) => `
          <div class="qc-thumb" onclick="openLightbox(${i})">
            <img src="${url}" alt="QC ${i+1}" loading="lazy">
          </div>
        `).join('')}
      </div>
    </div>` : ''}
  `;
}

window.openLightbox = (i) => {
  lightboxIndex = i;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
};

window.closeLightbox = () => {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
};

window.lightboxNav = (dir) => {
  lightboxIndex = (lightboxIndex + dir + qcImages.length) % qcImages.length;
  updateLightbox();
};

function updateLightbox() {
  document.getElementById('lightboxImg').src = qcImages[lightboxIndex];
  document.getElementById('lightboxCounter').textContent =
    `${lightboxIndex + 1} / ${qcImages.length}`;
}

// keyboard nav
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowRight') window.lightboxNav(1);
  if (e.key === 'ArrowLeft')  window.lightboxNav(-1);
  if (e.key === 'Escape')     window.closeLightbox();
});

// close on backdrop click
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget) window.closeLightbox();
});

load();
</script>
</body>
</html>
