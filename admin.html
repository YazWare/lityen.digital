<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lityen — admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  /* GATE */
  .gate {
    position: fixed; inset: 0; z-index: 999;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  .gate-box {
    display: flex; flex-direction: column; align-items: center;
    gap: 1rem; width: 300px; text-align: center;
  }
  .gate-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem; letter-spacing: 0.1em; margin-bottom: 0.5rem;
  }
  .gate-sub {
    font-size: 0.72rem; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;
  }
  .google-btn {
    display: flex; align-items: center; justify-content: center; gap: 0.75rem;
    width: 100%; padding: 0.75rem 1.25rem;
    background: #fff; border: none; border-radius: 12px;
    color: #1a1a1a; font-family: 'Outfit', sans-serif;
    font-size: 0.88rem; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s; margin-top: 0.5rem;
  }
  .google-btn:hover { opacity: 0.9; }
  .google-btn svg { flex-shrink: 0; }
  .gate-error {
    font-size: 0.72rem; color: var(--danger); min-height: 1em;
  }

  /* ADMIN UI */
  .main { padding: 1.5rem 1.75rem 3rem; position: relative; z-index: 1; }
  .admin-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .admin-row {
    display: flex; align-items: center; gap: 0.9rem;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 0.7rem 0.9rem;
    transition: border-color 0.2s;
  }
  .admin-row:hover { border-color: var(--border-hover); }
  .admin-thumb {
    width: 54px; height: 54px; border-radius: 8px;
    background: var(--bg3); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; overflow: hidden;
  }
  .admin-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .admin-info { flex: 1; min-width: 0; }
  .admin-name { font-size: 0.86rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .admin-meta { font-size: 0.68rem; color: var(--text3); margin-top: 0.15rem; }
  .admin-dots { display: flex; gap: 0.3rem; margin-top: 0.35rem; flex-wrap: wrap; }
  .dot { font-size: 0.58rem; padding: 0.08rem 0.42rem; border-radius: 100px; border: 1px solid var(--border); color: var(--text3); }
  .dot-litbuy { border-color: var(--orange-border); color: var(--orange); }
  .admin-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
  .user-pill {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.72rem; color: var(--text3);
  }
  .user-pill img { width: 24px; height: 24px; border-radius: 100px; }
  .signout-btn {
    font-size: 0.68rem; color: var(--text3); background: none;
    border: 1px solid var(--border); border-radius: 100px;
    padding: 0.2rem 0.6rem; cursor: pointer; transition: all 0.2s;
    font-family: 'Outfit', sans-serif;
  }
  .signout-btn:hover { color: var(--danger); border-color: rgba(255,94,125,0.3); }
</style>
</head>
<body>
<div class="orb-a"></div>
<div class="orb-b"></div>

<!-- GATE -->
<div class="gate" id="gate">
  <div class="gate-box">
    <div class="gate-logo">lityen 🔥</div>
    <div class="gate-sub">admin access</div>
    <button class="google-btn" id="googleBtn" onclick="signIn()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </button>
    <div class="gate-error" id="gateError"></div>
  </div>
</div>

<!-- ADMIN UI -->
<div id="adminUI" style="display:none">
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">lityen 🔥</a>
      <div class="header-right">
        <div class="user-pill">
          <img id="userAvatar" src="" alt="">
          <button class="signout-btn" onclick="signOut()">sign out</button>
        </div>
        <a href="catalog.html" class="nav-link">view catalog ↗</a>
        <button class="btn btn-accent btn-sm" onclick="openModal()">+ add item</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="admin-list" id="adminList">
      <div class="loading-state"><div class="spinner"></div><span>loading...</span></div>
    </div>
  </main>

  <!-- MODAL -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Add item</div>

      <div class="form-row">
        <div class="field"><label>Name *</label><input id="f-name" type="text" placeholder="Jordan 4 Bred Reimagined"></div>
        <div class="field"><label>Category *</label>
          <select id="f-cat">
            <option>Shoes</option><option>Hoodies</option><option>Tops</option>
            <option>Pants</option><option>Jackets</option><option>Bags</option>
            <option>Accessories</option><option>Other</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="field"><label>Price</label><input id="f-price" type="text" placeholder="¥320"></div>
        <div class="field"><label>Tags (comma separated)</label><input id="f-tags" type="text" placeholder="nike, jordan, fire"></div>
      </div>

      <div class="field"><label>Litbuy Link</label><input id="f-litbuy" type="text" placeholder="https://litbuy.com/..."></div>
      <div class="form-row">
        <div class="field"><label>Weidian Link</label><input id="f-weidian" type="text" placeholder="https://weidian.com/..."></div>
        <div class="field"><label>Taobao Link</label><input id="f-taobao" type="text" placeholder="https://item.taobao.com/..."></div>
      </div>
      <div class="field"><label>1688 Link</label><input id="f-1688" type="text" placeholder="https://detail.1688.com/..."></div>
      <div class="field"><label>Main image URL</label><input id="f-img" type="text" placeholder="https://..."></div>
      <div class="field"><label>QC image URLs (one per line)</label><textarea id="f-qc" placeholder="https://...&#10;https://..."></textarea></div>
      <div class="field"><label>Notes</label><textarea id="f-notes" rows="5" placeholder="TTS, great quality, ships in 3-5 days...&#10;Size up one for the boxy fit."></textarea></div>

      <div class="form-row">
        <div class="field"><label>New drop badge?</label>
          <select id="f-new"><option value="false">No</option><option value="true">Yes</option></select>
        </div>
        <div class="field"><label>Seen on video?</label>
          <select id="f-seen"><option value="false">No</option><option value="true">Yes 🎬</option></select>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-danger" id="deleteBtn" style="display:none;margin-right:auto" onclick="deleteItem()">delete</button>
        <button class="btn btn-outline" onclick="closeModal()">cancel</button>
        <button class="btn btn-accent" id="saveBtn" onclick="saveItem()">save item</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import {
  getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc,
  doc, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const ALLOWED_EMAIL = 'yani.abdelli6@gmail.com';

const app = initializeApp({
  apiKey: "AIzaSyBo-hOtlG2aptuJ71LCoAd1BgVUINg3uvE",
  authDomain: "lityenn.firebaseapp.com",
  projectId: "lityenn",
  storageBucket: "lityenn.firebasestorage.app",
  messagingSenderId: "1074230941679",
  appId: "1:1074230941679:web:03091885d3e62d4b0a881a"
});

const auth = getAuth(app);
const db   = getFirestore(app);
const provider = new GoogleAuthProvider();

let items = [];
let editingId = null;

// Auth state
onAuthStateChanged(auth, user => {
  if (user && user.email === ALLOWED_EMAIL) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('adminUI').style.display = 'block';
    document.getElementById('userAvatar').src = user.photoURL || '';
    loadItems();
  } else if (user) {
    // wrong account
    fbSignOut(auth);
    document.getElementById('gateError').textContent = 'Access denied. Wrong Google account.';
  } else {
    document.getElementById('gate').style.display = 'flex';
    document.getElementById('adminUI').style.display = 'none';
  }
});

window.signIn = async () => {
  try {
    document.getElementById('gateError').textContent = '';
    await signInWithPopup(auth, provider);
  } catch(e) {
    document.getElementById('gateError').textContent = 'Sign in failed. Try again.';
  }
};

window.signOut = () => fbSignOut(auth);

async function loadItems() {
  try {
    const snap = await getDocs(query(collection(db, 'items'), orderBy('createdAt', 'desc')));
    items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderList();
  } catch(e) {
    document.getElementById('adminList').innerHTML =
      `<div class="loading-state" style="color:var(--danger)">Error: ${e.message}</div>`;
  }
}

function renderList() {
  const el = document.getElementById('adminList');
  if (!items.length) {
    el.innerHTML = `<div class="loading-state">no items yet — add your first drop!</div>`;
    return;
  }
  el.innerHTML = items.map(item => `
    <div class="admin-row">
      <div class="admin-thumb">
        ${item.img ? `<img src="${item.img}" alt="">` : '📦'}
      </div>
      <div class="admin-info">
        <div class="admin-name">${item.name}</div>
        <div class="admin-meta">${item.category || '—'} · ${item.price || 'no price'}</div>
        <div class="admin-dots">
          ${item.litbuy     ? `<span class="dot dot-litbuy">litbuy</span>` : ''}
          ${item.weidian    ? `<span class="dot">weidian</span>` : ''}
          ${item.taobao     ? `<span class="dot">taobao</span>`  : ''}
          ${item._1688      ? `<span class="dot">1688</span>`    : ''}
          ${item.isNew      ? `<span class="dot">new</span>`     : ''}
          ${item.seenOnVideo ? `<span class="dot">🎬</span>`    : ''}
        </div>
      </div>
      <div class="admin-actions">
        <a class="btn btn-outline btn-sm" href="item.html?id=${item.id}" target="_blank">view ↗</a>
        <button class="btn btn-sm" style="border:1px solid var(--accent-border);color:var(--accent);background:transparent"
          onclick="openEdit('${item.id}')">edit</button>
      </div>
    </div>
  `).join('');
}

window.openModal = () => {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add item';
  document.getElementById('deleteBtn').style.display = 'none';
  ['f-name','f-price','f-tags','f-litbuy','f-weidian','f-taobao','f-1688','f-img','f-qc','f-notes'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-cat').value  = 'Shoes';
  document.getElementById('f-new').value  = 'false';
  document.getElementById('f-seen').value = 'false';
  document.getElementById('overlay').classList.add('open');
};

window.openEdit = (id) => {
  editingId = id;
  const item = items.find(i => i.id === id);
  document.getElementById('modalTitle').textContent = 'Edit item';
  document.getElementById('deleteBtn').style.display = 'block';
  document.getElementById('f-name').value    = item.name    || '';
  document.getElementById('f-cat').value     = item.category|| 'Shoes';
  document.getElementById('f-price').value   = item.price   || '';
  document.getElementById('f-tags').value    = (item.tags   || []).join(', ');
  document.getElementById('f-litbuy').value  = item.litbuy  || '';
  document.getElementById('f-weidian').value = item.weidian || '';
  document.getElementById('f-taobao').value  = item.taobao  || '';
  document.getElementById('f-1688').value    = item._1688   || '';
  document.getElementById('f-img').value     = item.img     || '';
  document.getElementById('f-qc').value      = (item.qc     || []).join('\n');
  document.getElementById('f-notes').value   = item.notes   || '';
  document.getElementById('f-new').value     = String(item.isNew       || false);
  document.getElementById('f-seen').value    = String(item.seenOnVideo || false);
  document.getElementById('overlay').classList.add('open');
};

window.closeModal = () => document.getElementById('overlay').classList.remove('open');

window.saveItem = async () => {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Name is required'); return; }
  const btn = document.getElementById('saveBtn');
  btn.textContent = 'saving…'; btn.disabled = true;

  const data = {
    name,
    category:    document.getElementById('f-cat').value,
    price:       document.getElementById('f-price').value.trim(),
    tags:        document.getElementById('f-tags').value.split(',').map(t => t.trim()).filter(Boolean),
    litbuy:      document.getElementById('f-litbuy').value.trim(),
    weidian:     document.getElementById('f-weidian').value.trim(),
    taobao:      document.getElementById('f-taobao').value.trim(),
    _1688:       document.getElementById('f-1688').value.trim(),
    img:         document.getElementById('f-img').value.trim(),
    qc:          document.getElementById('f-qc').value.split('\n').map(u => u.trim()).filter(Boolean),
    notes:       document.getElementById('f-notes').value.trim(),
    isNew:       document.getElementById('f-new').value  === 'true',
    seenOnVideo: document.getElementById('f-seen').value === 'true',
  };

  try {
    if (editingId) {
      await updateDoc(doc(db, 'items', editingId), data);
    } else {
      await addDoc(collection(db, 'items'), { ...data, createdAt: serverTimestamp() });
    }
    closeModal();
    await loadItems();
  } catch(e) { alert('Error: ' + e.message); }

  btn.textContent = 'save item'; btn.disabled = false;
};

window.deleteItem = async () => {
  if (!confirm('Delete this item?')) return;
  try {
    await deleteDoc(doc(db, 'items', editingId));
    closeModal();
    await loadItems();
  } catch(e) { alert('Error: ' + e.message); }
};

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
</script>
</body>
</html>
